data_dir: data
results_dir: data # output example ./data/mls_german_ssl

pipeline: ssl
anon_suffix: _BM1

datasets:
  - name: train_english
    data: train_english
  - name: train_german
    data: train_german
  - name: train_spanish
    data: train_spanish
  - name: train_french
    data: train_french
  - name: ja_dev
    data: ja_dev
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: ja_test
    data: ja_test
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: cn_dev
    data: cn_dev
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: cn_test
    data: cn_test
    enrolls: [_enrolls]
    trials: [_trials_mixed]

modules:
  anon_suffix: !ref <anon_suffix>
  world_size: 50
  region_size: 10
  anon_level_random_per_utt:      [train_english, train_german, train_spanish, train_french, ja_dev, ja_test, cn_dev, cn_test] # Overwrite anon_level_constant because above
  anon_level_constant:            [train_english, train_german, train_spanish, train_french, ja_dev, ja_test, cn_dev, cn_test]
  #target_constant_spkid: "6081" # For anon_level_constant, must be one of the training data (libriTTS)
  device: "cuda"
  batch_size: 8 # works with GPU < 12Gib
