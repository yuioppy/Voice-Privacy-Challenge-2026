data_dir: data
results_dir: data # output example ./data/mls_german_ssl

pipeline: ssl
anon_suffix: !ref _BM1

datasets:
  - name: en_dev
    data: en_dev
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: en_test
    data: en_test
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: fr_dev
    data: fr_dev
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: fr_test
    data: fr_test
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: es_dev
    data: es_dev
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: es_test
    data: es_test
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: de_dev
    data: de_dev
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: de_test
    data: de_test
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: emodata_track2_dev
    data: emodata_track2_dev
  - name: emodata_track2_test
    data: emodata_track2_test
  - name: train_english
    data: train_english
  - name: train_german
    data: train_german
  - name: train_spanish
    data: train_spanish
  - name: train_french
    data: train_french
  - name: ja_dev
    data: ja_dev
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: ja_test
    data: ja_test
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: cn_dev
    data: cn_dev
    enrolls: [_enrolls]
    trials: [_trials_mixed]
  - name: cn_test
    data: cn_test
    enrolls: [_enrolls]
    trials: [_trials_mixed]

modules:
  anon_suffix: !ref <anon_suffix>
  world_size: 50
  region_size: 10
  anon_level_random_per_utt:      [en_dev, en_test, de_dev, de_test, fr_dev, fr_test, es_dev, es_test, emodata_track2_dev, emodata_track2_test, train_english, train_german, train_spanish, train_french, ja_dev, ja_test, cn_dev, cn_test] # Overwrite anon_level_constant because above
  anon_level_constant:            [en_dev, en_test, de_dev, de_test, fr_dev, fr_test, es_dev, es_test, emodata_track2_dev, emodata_track2_test, train_english, train_german, train_spanish, train_french, ja_dev, ja_test, cn_dev, cn_test]
  #target_constant_spkid: "6081" # For anon_level_constant, must be one of the training data (libriTTS)
  device: "cuda"
  batch_size: 8 # works with GPU < 12Gib 
